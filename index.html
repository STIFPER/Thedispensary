    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              inter: ["Inter", "sans-serif"],
              mont: ["Montserrat", "sans-serif"],
            },
            animation: {
              fadeIn: "fadeIn 0.2s ease-out",
              toastIn: "toastIn 0.3s ease-out",
              slideIn: "slideIn 0.3s ease-out",
              bounceScale:
                "bounceScale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)",
            },
            keyframes: {
              fadeIn: {
                "0%": { opacity: "0", transform: "scale(0.98)" },
                "100%": { opacity: "1", transform: "scale(1)" },
              },
              toastIn: {
                "0%": {
                  opacity: "0",
                  transform: "translateY(10px) translateX(-50%)",
                },
                "100%": {
                  opacity: "1",
                  transform: "translateY(0) translateX(-50%)",
                },
              },
              slideIn: {
                "0%": { opacity: "0", transform: "translateX(-10px)" },
                "100%": { opacity: "1", transform: "translateX(0)" },
              },
              bounceScale: {
                "0%": { transform: "scale(1)" },
                "50%": { transform: "scale(1.3)" },
                "100%": { transform: "scale(1)" },
              },
            },
          },
        },
      };

    <style>
      body {
        background-color: #1d1e1e;
        color: white;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1d1e1e;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .cart-item-enter {
        animation: slideIn 0.3s ease-out;
      }
      /* Performance hints */
      #root {
        content-visibility: auto;
      }
      .group {
        will-change: auto;
      }
      /* Loading skeleton */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #1d1e1e;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }
      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .loading-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a0d4b2;
        margin: 0 4px;
        animation: dotBounce 0.8s infinite alternate;
      }
      .loading-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .loading-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes dotBounce {
        from {
          opacity: 0.3;
          transform: translateY(0);
        }
        to {
          opacity: 1;
          transform: translateY(-8px);
        }
      }
    </style>
  </head>

      window.__dismissLoading = function () {
        var el = document.getElementById("loading-screen");
        if (el) {
          el.classList.add("hidden");
          setTimeout(function () {
            el.remove();
          }, 600);
        }
      };

      const terpeneColors = {
        myrcene: "#2b398c",
        caryophyllene: "#77823d",
        humulene: "#fd8b03",
        limonene: "#7bc70f",
        ocimene: "#009282",

      const TerpeneBadge = memo(({ name }) => {
        const key = name.split(" ")[0].toLowerCase().trim();
        const color = terpeneColors[key] || "#4b5563";
        return (
          <span
            className="inline-block text-white font-mont font-bold text-[9px] px-2 py-0.5 rounded-sm mr-1 mb-1 uppercase tracking-wide shadow-sm"
            style={{ backgroundColor: color }}

            {name}
          </span>
        );

      const BadgeElement = memo(({ type, size = "sm" }) => {
        const styles = {
          full: {
            size: "102px",
            fontNew: "22px",
            fontBest: "18px",
            fontBuy: "15px",
            lh: "1.1",
          },
          md: {
            size: "68px",
            fontNew: "15px",
            fontBest: "13px",
            fontBuy: "10px",
            lh: "1.1",
          },
          sm: {
            size: "52px",
            fontNew: "11px",
            fontBest: "9px",
            fontBuy: "8px",
            lh: "1.1",
          },
        };
        const config = styles[size];
        const boxStyle = {
          width: config.size,
          height: config.size,
          minWidth: config.size,
          minHeight: config.size,
        };
        const clipStyle = {
          clipPath:
            "polygon(50% 0%, 61% 10%, 75% 6%, 79% 20%, 93% 25%, 90% 39%, 100% 50%, 90% 61%, 93% 75%, 79% 80%, 75% 94%, 61% 90%, 50% 100%, 39% 90%, 25% 94%, 21% 80%, 7% 75%, 10% 61%, 0% 50%, 10% 39%, 7% 25%, 21% 20%, 25% 6%, 39% 10%)",
        };

        let content = null;
        let bgClass = "";

        if (type === "NEW") {
          bgClass = "bg-[#A4F21E]";
          content = <span style={{ fontSize: config.fontNew }}>NEW</span>;
        } else if (type === "BEST SELLER") {
          bgClass = "bg-[#FFC107]";
          content = (
            <>
              <span
                style={{ fontSize: config.fontBest, lineHeight: config.lh }}
              >
                BEST
              </span>
              <span
                style={{ fontSize: config.fontBest, lineHeight: config.lh }}
              >
                SELLER
              </span>
            </>
          );
        } else if (type === "BUY 1" || (type && type.includes("BUY 1"))) {
          bgClass = "bg-[#E61633]";
          content = (
            <>
              <span style={{ fontSize: config.fontBuy, lineHeight: config.lh }}>
                BUY 1
              </span>
              <span style={{ fontSize: config.fontBuy, lineHeight: config.lh }}>
                GET 1
              </span>
              <span style={{ fontSize: config.fontBuy, lineHeight: config.lh }}>
                FREE
              </span>
            </>
          );
        } else if (type === "BUY 2") {
          bgClass = "bg-[#FF2E7E]";
          content = (
            <>
              <span style={{ fontSize: config.fontBuy, lineHeight: config.lh }}>
                BUY 2
              </span>
              <span style={{ fontSize: config.fontBuy, lineHeight: config.lh }}>
                GET 1
              </span>
              <span style={{ fontSize: config.fontBuy, lineHeight: config.lh }}>
                FREE
              </span>
            </>
          );
        }

        if (!content) return null;
        return (
          <div
            className={`flex flex-col justify-center items-center text-center text-white font-inter font-black shrink-0 grow-0 hover:scale-110 hover:rotate-6 transition-transform duration-200 ${bgClass}`}

          >
            {content}
          </div>
        );

      const StatusBadge = memo(({ tags, size = "sm" }) => {
        const placeholderSize =
          size === "sm" ? "52px" : size === "md" ? "68px" : "102px";
        const containerStyle = {
          width: placeholderSize,
          minWidth: placeholderSize,
        };

        if (!tags || tags.length === 0) {
          return <div style={containerStyle} className="mr-2 shrink-0"></div>;
        }
        const tag = tags[0];
        let type = "";
        if (tag === "NEW") type = "NEW";
        else if (tag === "BEST SELLER") type = "BEST SELLER";
        else if (tag.includes("BUY 1")) type = "BUY 1";

        if (type) {
          return (
            <div
              className="flex items-center justify-center mr-2 shrink-0"
              style={containerStyle}
            >
              <BadgeElement type={type} size={size} />
            </div>
          );
        }
        return <div style={containerStyle} className="mr-2 shrink-0"></div>;

                      {product.name}

                    <div className="flex items-center gap-3">
                      <span className="bg-[#a0d4b2]/10 text-[#a0d4b2] px-2 py-1 rounded text-xs font-bold border border-[#a0d4b2]/20">
                        THC {product.thc}
                      </span>
                      {product.cbd !== "0%" && (
                        <span className="bg-gray-700/50 text-gray-300 px-2 py-1 rounded text-xs font-bold border border-gray-600">
                          CBD {product.cbd}
                        </span>
                      )}
                    </div>
                  </div>
                  <div className="pt-1">
                    <StatusBadge tags={product.tags} size="md" />
                  </div>
                </div>
              </div>

              <div className="p-6 space-y-6 bg-[#1d1e1e]">
                <div className="space-y-3">
                  <div
                    className={`flex items-center justify-between p-3 rounded-lg border ${qty1g > 0 ? "border-[#a0d4b2] bg-[#a0d4b2]/5" : "border-white/10 bg-white/5"} transition-colors`}
                  >
                    <div>
                      <span className="block font-bold text-gray-300 text-sm uppercase">

                      <span className="block font-black text-white text-xl">

                    <div className="flex items-center gap-4 bg-black/30 rounded-full p-1">
                      <button
                        onClick={() => setQty1g(Math.max(0, qty1g - 1))}
                        className={`p-2 rounded-full transition-colors ${qty1g > 0 ? "text-white hover:bg-white/10" : "text-gray-600"}`}
                      >
                        <Minus size={16} />
                      </button>
                      <span
                        className={`font-black w-4 text-center ${qty1g > 0 ? "text-[#a0d4b2]" : "text-gray-500"}`}
                      >
                        {qty1g}
                      </span>
                      <button
                        onClick={() => setQty1g(qty1g + 1)}
                        className="p-2 rounded-full text-white hover:bg-white/10 transition-colors"
                      >
                        <Plus size={16} />
                      </button>
                    </div>
                  </div>

                  <div
                    className={`flex items-center justify-between p-3 rounded-lg border ${qty35g > 0 ? "border-[#a0d4b2] bg-[#a0d4b2]/5" : "border-white/10 bg-white/5"} transition-colors`}
                  >
                    <div>
                      <span className="block font-bold text-gray-300 text-sm uppercase">
                        3.5 Grams
                      </span>
                      <span className="block font-black text-white text-xl">
                        {product.p35}
                      </span>
                    </div>
                    <div className="flex items-center gap-4 bg-black/30 rounded-full p-1">
                      <button
                        onClick={() => setQty35g(Math.max(0, qty35g - 1))}
                        className={`p-2 rounded-full transition-colors ${qty35g > 0 ? "text-white hover:bg-white/10" : "text-gray-600"}`}
                      >
                        <Minus size={16} />
                      </button>
                      <span
                        className={`font-black w-4 text-center ${qty35g > 0 ? "text-[#a0d4b2]" : "text-gray-500"}`}
                      >
                        {qty35g}
                      </span>
                      <button
                        onClick={() => setQty35g(qty35g + 1)}
                        className="p-2 rounded-full text-white hover:bg-white/10 transition-colors"
                      >
                        <Plus size={16} />
                      </button>
                    </div>
                  </div>
                </div>

                <div>
                  <h3 className="font-bold text-gray-400 text-xs uppercase mb-3 flex items-center">
                    <span className="w-1.5 h-1.5 rounded-full bg-[#a0d4b2] mr-2"></span>
                    Terpene Profile
                  </h3>
                  <div className="flex flex-wrap gap-2">
                    {(product.terpenes || []).map((t, i) => (
                      <span
                        key={i}
                        className="bg-gray-800 border border-gray-700 text-gray-300 font-mont font-bold text-[10px] md:text-xs px-3 py-1.5 rounded-md uppercase shadow-sm flex items-center"
                      >
                        {t}
                      </span>
                    ))}
                  </div>
                </div>

                <button
                  onClick={handleAdd}
                  disabled={totalItems === 0}
                  className={`w-full font-black py-4 uppercase rounded-lg transition-all duration-300 tracking-wide text-sm shadow-lg flex items-center justify-center gap-2
                  ${totalItems > 0 ? "bg-white hover:bg-[#a0d4b2] text-black hover:text-black hover:shadow-[#a0d4b2]/20" : "bg-gray-800 text-gray-500 cursor-not-allowed border border-gray-700"}`}
                >
                  {totalItems > 0
                    ? `Add to Cart (${totalItems})`
                    : "Select Quantity"}
                </button>
              </div>
            </div>
          </div>
        );
      };

      const App = () => {
        // 🔒 CONTROL PANEL
        const ENABLE_WELCOME = false;
        const ENABLE_CART = true;
        
        // 🟩 LINE OA ID (เปลี่ยนเป็นไอดีของร้านคุณ)
        const LINE_OA_ID = "@thedispensary"; // ตัวอย่าง: @123abcde ต้องมี @ ด้วย

        const [selectedProduct, setSelectedProduct] = useState(null);
        const [cart, setCart] = useState([]);
        const [isCartOpen, setIsCartOpen] = useState(false);
        const [notification, setNotification] = useState(null);
        const [cartBump, setCartBump] = useState(false);
        const [showWelcome, setShowWelcome] = useState(false);
        const cartReady = useRef(false);

        // ✅ MENU LOAD
        const [menu, setMenu] = useState({
          meta: {},
          products: [],
          preRolls: [],
        });
        const [menuError, setMenuError] = useState("");

        useEffect(() => {
          fetch("./menu.json")
            .then((r) => {
              if (!r.ok) throw new Error("menu.json not found: " + r.status);
              return r.json();
            })
            .then((data) => {
              setMenu(data);
              setMenuError("");

              setTimeout(() => {
                if (window.__dismissLoading) window.__dismissLoading();
              }, 300);
            })
            .catch((err) => {
              setMenuError(String(err));
              setMenu({ meta: {}, products: [], preRolls: [] });

              setTimeout(() => {
                if (window.__dismissLoading) window.__dismissLoading();
              }, 300);
            });
        }, []);

        const products = menu.products || [];
        const preRolls = menu.preRolls || [];

        // ✅ Load cart from session once
        useEffect(() => {
          try {
            const saved = JSON.parse(sessionStorage.getItem("cart_v1") || "[]");
            if (Array.isArray(saved)) setCart(saved);
          } catch {}
          cartReady.current = true;
        }, []);

        // ✅ Save cart whenever changed
        useEffect(() => {
          if (!cartReady.current) return;
          try {
            sessionStorage.setItem("cart_v1", JSON.stringify(cart));
          } catch {}
          window.dispatchEvent(new Event("cart:updated"));
        }, [cart]);

        // ✅ open cart event
        useEffect(() => {
          if (!ENABLE_CART) return;
          const open = () => setIsCartOpen(true);
          window.addEventListener("cart:open", open);
          return () => window.removeEventListener("cart:open", open);
        }, [ENABLE_CART]);

        const handleBatchAddToCart = useCallback((product, qty1, qty35) => {
          let newItems = [];
          let promoText = "";
          let tags = product.tags || [];

          if (tags.length > 0) {
            const tag = tags[0];
            if (tag.includes("BUY 1")) promoText = "BUY 1 GET 1 FREE";
            else if (tag.includes("BUY 2")) promoText = "BUY 2 GET 1 FREE";
          }

          const base = Date.now();
          for (let i = 0; i < qty1; i++)
            newItems.push({
              id: base + i,
              name: product.name,
              size: "1G",
              price: product.p1,
              promo: promoText,
              tags: tags,
            });
          for (let i = 0; i < qty35; i++)
            newItems.push({
              id: base + qty1 + i + 1000,
              name: product.name,
              size: "3.5G",
              price: product.p35,
              promo: promoText,
              tags: tags,
            });

          setCart((prev) => [...prev, ...newItems]);
          const totalAdded = qty1 + qty35;
          setNotification(`ADDED: ${product.name} (${totalAdded} ITEMS)`);
          setCartBump(true);

          if (window.notifyTimer) clearTimeout(window.notifyTimer);
          if (window.bumpTimer) clearTimeout(window.bumpTimer);
          window.notifyTimer = setTimeout(() => setNotification(null), 2500);
          window.bumpTimer = setTimeout(() => setCartBump(false), 300);
        }, []);

        const addSingleToCart = useCallback((product, size, price, e) => {
          if (e) e.stopPropagation();
          let promoText = "";
          if (size === "JOINT") promoText = "BUY 2 GET 1 FREE";

          const newItem = {
            id: Date.now() + Math.floor(Math.random() * 999),
            name: product.name,
            size,
            price,
            promo: promoText,
            tags: product.tags || [],
          };
          setCart((prev) => [...prev, newItem]);

          setNotification(`ADDED: ${product.name} (${size})`);
          setCartBump(true);

          if (window.notifyTimer) clearTimeout(window.notifyTimer);
          if (window.bumpTimer) clearTimeout(window.bumpTimer);
          window.notifyTimer = setTimeout(() => setNotification(null), 2500);
          window.bumpTimer = setTimeout(() => setCartBump(false), 300);
        }, []);

        const removeFromCart = useCallback((id) =>
          setCart((prev) => prev.filter((item) => item.id !== id)), []);

        const clearCart = useCallback(() => setCart([]), []);

        // ✅ MEMOIZED CALCULATIONS WITH USEMEMO
        const totalGrams = useMemo(() => 
          cart.reduce(
            (sum, item) =>
              item.size === "1G"
                ? sum + 1
                : item.size === "3.5G"
                  ? sum + 3.5
                  : sum,
            0,
          ), 
          [cart]
        );

        const totalJoints = useMemo(() => 
          cart.reduce(
            (sum, item) => (item.size === "JOINT" ? sum + 1 : sum),
            0,
          ),
          [cart]
        );

        const groupedCart = useMemo(() => 
          cart.reduce((acc, item) => {
            if (!acc[item.name])
              acc[item.name] = { name: item.name, tags: item.tags, items: [] };
            acc[item.name].items.push(item);
            return acc;
          }, {}),
          [cart]
        );

        // 🟩 ฟังก์ชันสำหรับส่งออเดอร์ไปที่ LINE
        const handleLineCheckout = () => {
          if (cart.length === 0) return;

          // 1. สร้างข้อความสรุปออเดอร์เป็นแบบฟอร์มบิลใบเสร็จที่สวยงามอ่านง่าย (UX text design)
          let orderText = "🧾 *ORDER SUMMARY* 🧾\n";
          orderText += "━━━━━━━━━━━━━━━━\n";
          
          Object.values(groupedCart).forEach((group, index) => {
            orderText += `${index + 1}. ${group.name}\n`;
            
            // สรุปจำนวนแยกตามขนาด
            const sizes = group.items.reduce((acc, item) => {
              acc[item.size] = (acc[item.size] || 0) + 1;
              return acc;
            }, {});

            Object.entries(sizes).forEach(([size, qty]) => {
              orderText += `   🔸 ${size} × ${qty}\n`;
            });
            orderText += "\n";
          });

          orderText += "━━━━━━━━━━━━━━━━\n";
          if (totalGrams > 0) orderText += `🌿 Total Flower: ${totalGrams} G\n`;
          if (totalJoints > 0) orderText += `🚬 Total Pre-rolls: ${totalJoints} Joints\n`;
          orderText += "\n(ตรวจสอบออเดอร์เรียบร้อยแล้ว รบกวนแอดมินสรุปยอดได้เลยครับ/ค่ะ 🙏)";

          // 2. 💡 UX Fallback: คัดลอกบิลลง Clipboard ของลูกค้าอัตโนมัติ 
          // เพื่อป้องกันกรณี LINE ในบางอุปกรณ์ไม่ยอมกรอกข้อความให้ (ลูกค้ากด Paste ลงไปได้เลย)
          const textArea = document.createElement("textarea");
          textArea.value = orderText;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
          } catch (err) {
            console.error('Copy failed', err);
          }
          document.body.removeChild(textArea);

          // แจ้งเตือนผู้ใช้ว่าทำการคัดลอกบิลแล้ว
          setNotification("คัดลอกบิลแล้ว! กดวาง (Paste) ในแชท LINE ได้เลย");
          setCartBump(true);
          
          // ปิดแจ้งเตือนหลังจาก 4 วินาที
          if (window.notifyTimer) clearTimeout(window.notifyTimer);
          window.notifyTimer = setTimeout(() => setNotification(null), 4000);

          // URL Encode ข้อความเพื่อใช้ส่งค่าผ่าน Link ไปยัง LINE OA
          const encodedText = encodeURIComponent(orderText);
          
          // สร้าง Deep Link สำหรับ LINE OA (เปลี่ยนลิงก์ตามไอดีร้าน)
          const lineUrl = `https://line.me/R/oaMessage/${LINE_OA_ID}/?${encodedText}`;
          
          // เด้งเปิดหน้าต่าง LINE (หน่วงเวลา 0.8 วิ ให้ลูกค้าอ่านแจ้งเตือนทัน)
          setTimeout(() => {
            window.open(lineUrl, '_blank');
          }, 800);
        };

        // ✅ MEMOIZED CATEGORY FILTERING (ป้องกันการประมวลผลซ้ำ)
        const sativa = useMemo(() => products.filter((p) => p.cat === "SATIVA"), [products]);
        const indica = useMemo(() => products.filter((p) => p.cat === "INDICA"), [products]);
        const hybrid = useMemo(() => products.filter((p) => p.cat === "HYBRID"), [products]);
        const cbd = useMemo(() => products.filter((p) => p.cat === "CBD"), [products]);
        const compound = useMemo(() => products.filter((p) => p.cat === "COMPOUND"), [products]);

        return (
          <div className="min-h-screen flex flex-col pb-10 bg-[#1d1e1e] text-white pointer-events-auto select-none">
            {menuError && (
              <div className="max-w-[1400px] mx-auto w-full px-4 py-3 mb-4 bg-red-500/20 border border-red-500 text-red-200 text-sm">
                MENU ERROR: {menuError}
              </div>
            )}

            {notification && (
              <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-[#a0d4b2] text-black px-4 py-3 rounded shadow-2xl z-[100] flex items-center gap-3 animate-toastIn border border-white/20">
                <div className="bg-black/10 p-1.5 rounded-full shrink-0">
                  <Check size={16} />
                </div>
                <div>
                  <span className="block font-black text-[10px] uppercase tracking-wider opacity-60">
                    {notification.includes("LINE") ? "SYSTEM NOTIFICATION" : "ADDED TO CART"}
                  </span>
                  <span className="block font-bold text-xs uppercase leading-none whitespace-nowrap">
                    {notification}
                  </span>
                </div>
              </div>
            )}

            <header className="max-w-[1400px] mx-auto w-full px-4 pt-8 pb-6 flex flex-col items-center text-center">
              <h2 className="font-black text-2xl text-white uppercase tracking-wider opacity-80 mb-2 w-full text-center">
                THE DISPENSARY
              </h2>
              <h1 className="font-black text-[40px] md:text-5xl text-[#a0d4b2] uppercase leading-none tracking-tight mb-2 w-full text-center">
                FLOWER MENU
              </h1>
              <p className="font-black text-lg text-white uppercase tracking-[0.2em] mb-8 w-full text-center">
                {menu.meta?.monthLabel ||
                  new Date()
                    .toLocaleString("en-US", { month: "long", year: "numeric" })
                    .toUpperCase()}
              </p>

              <div className="border-t border-b border-gray-600 py-4 grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 text-xs font-inter uppercase tracking-wide text-gray-400 w-full max-w-4xl">
                <div>
                  <strong className="block text-white mb-1 text-sm font-black">
                    TRUSTED QUALITY
                  </strong>
                  HAND-TRIMMED, LAB-TESTED
                </div>
                <div className="md:border-x border-gray-600">
                  <strong className="block text-white mb-1 text-sm font-black">
                    GACP CERTIFIED
                  </strong>
                  MEDICAL STANDARDS COMPLIANT
                </div>
                <div>
                  <strong className="block text-white mb-1 text-sm font-black">
                    PRESCRIPTION AVAILABLE
                  </strong>
                  DOCTOR'S PRESCRIPTIONS IN-STORE
                </div>
              </div>
            </header>

            <main className="flex flex-col md:flex-row gap-6 max-w-[1400px] mx-auto w-full px-4">
              <div className="contents md:flex md:flex-col md:w-1/2 md:gap-6">
                <div className="order-1 border border-white/20 rounded-sm overflow-hidden flex flex-col bg-white/[0.01]">
                  <BoxHeader title="SATIVA" bgColor="#9e9e5e" />
                  <div className="p-2 space-y-1">
                    {sativa.map((p) => (
                      <ProductCard
                        key={p.name}
                        product={p}
                        onClick={setSelectedProduct}
                      />
                    ))}
                  </div>
                </div>

                {menu?.meta?.showCBD && (
                  <div className="order-4 border border-white/20 rounded-sm overflow-hidden bg-white/[0.01]">
                    <BoxHeader title="CBD" bgColor="#9e5e97" />
                    <div className="p-2">
                      {cbd.map((p) => (
                        <ProductCard
                          key={p.name}
                          product={p}
                          onClick={setSelectedProduct}
                        />
                      ))}
                    </div>
                  </div>
                )}

                <div className="order-6 border border-white/20 rounded-sm overflow-hidden bg-white/[0.01] flex flex-col flex-1">
                  <div className="flex justify-between items-center px-4 py-3 border-b border-white/20 bg-[#1d1e1e]">
                    <h2 className="font-black text-2xl md:text-3xl text-[#a0d4b2] uppercase">
                      PRE-ROLLS
                    </h2>
                    <div className="font-black text-xl md:text-2xl text-white">
                      550/JOINT
                    </div>
                  </div>
                  <div className="p-4 flex flex-col flex-1">
                    <div className="flex justify-end mb-2">
                      <BadgeElement type="BUY 2" size="full" />
                    </div>
                    <div className="grid grid-cols-2 gap-2 content-center flex-1">
                      {preRolls.map((name, i) => (
                        <button
                          key={name}
                          onClick={(e) =>
                            addSingleToCart({ name: name }, "JOINT", 550, e)
                          }
                          className="group relative bg-white/5 hover:bg-white/10 border border-white/10 hover:border-[#a0d4b2] p-2 rounded flex items-center justify-between transition-all active:scale-95 active:bg-[#a0d4b2]/20 text-left h-full"
                        >
                          <div className="flex items-center min-w-0 flex-1 pr-2">
                            <span className="text-[#a0d4b2] mr-2 text-xs shrink-0">
                              ●
                            </span>
                            <span className="font-black text-[10px] md:text-xs text-white uppercase tracking-wide leading-tight">
                              {name}
                            </span>
                          </div>
                          <div className="bg-[#1d1e1e] p-1 rounded text-[#a0d4b2] group-hover:bg-[#a0d4b2] group-hover:text-black transition-colors shrink-0 border border-[#a0d4b2]/20 group-hover:border-transparent">
                            <Plus size={14} />
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="px-4 pb-2 text-center text-[10px] text-gray-500 font-bold uppercase">
                    (CLICK STRAIN TO ADD • ROLLING SERVICE AVAILABLE)
                  </div>
                </div>
              </div>

              <div className="contents md:flex md:flex-col md:w-1/2 md:gap-6">
                <div className="order-2 border border-white/20 rounded-sm overflow-hidden bg-white/[0.01]">
                  <BoxHeader title="INDICA" bgColor="#158cab" />
                  <div className="p-2 space-y-1">
                    {indica.map((p) => (
                      <ProductCard
                        key={p.name}
                        product={p}
                        onClick={setSelectedProduct}
                      />
                    ))}
                  </div>
                </div>

                <div className="order-3 border border-white/20 rounded-sm overflow-hidden bg-white/[0.01]">
                  <BoxHeader title="HYBRID" bgColor="#797a72" />
                  <div className="p-2 space-y-1">
                    {hybrid.map((p) => (
                      <ProductCard
                        key={p.name}
                        product={p}
                        onClick={setSelectedProduct}
                      />
                    ))}
                  </div>
                </div>

                {menu?.meta?.showCompound && (
                  <div className="order-5 border border-blue-900/60 rounded-sm overflow-hidden bg-[#0a101f] relative flex flex-col">
                    <div
                      className="absolute inset-0 opacity-10 pointer-events-none"
                      style={{
                        backgroundImage:
                          "radial-gradient(circle, #333 1px, transparent 1px)",
                        backgroundSize: "20px 20px",
                      }}
                    ></div>
                    <div className="flex justify-between items-center px-4 py-3 border-b border-blue-900/40 relative z-10 bg-[#0a101f]/80 backdrop-blur-sm">
                      <h2 className="font-black text-xl md:text-2xl text-white uppercase tracking-tight">
                        COMPOUND GENETICS
                      </h2>
                      <span className="font-black text-white text-xs md:text-sm opacity-80">
                        1G | 3.5G
                      </span>
                    </div>
                    <div className="p-2 space-y-1 relative z-10 flex-1">
                      {compound.map((p) => (
                        <ProductCard
                          key={p.name}
                          product={p}
                          onClick={setSelectedProduct}
                        />
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </main>

            {selectedProduct && (
              <ProductModal
                product={selectedProduct}
                onClose={() => setSelectedProduct(null)}
                onAddToCart={handleBatchAddToCart}
              />
            )}
            {showWelcome && (
              <WelcomeModal onClose={() => setShowWelcome(false)} />
            )}

            {ENABLE_CART && isCartOpen && (
              <div
                className="fixed inset-0 bg-black/90 z-[60] overflow-y-auto backdrop-blur-sm animate-fadeIn"
                onClick={() => setIsCartOpen(false)}
              >
                <div className="min-h-full flex items-center justify-center p-4">
                  <div
                    className="bg-[#1d1e1e] border-2 border-[#a0d4b2] w-full max-w-md relative shadow-2xl flex flex-col my-8"
                    onClick={(e) => e.stopPropagation()}
                  >
                    <div className="bg-[#a0d4b2] p-4 pb-5 flex flex-col gap-3 text-black shrink-0 relative">
                      <div className="flex justify-between items-start">
                        <div>
                          <h2 className="font-black text-2xl uppercase tracking-tight leading-none">
                            ORDER SUMMARY
                          </h2>
                          <p className="font-bold text-[10px] uppercase opacity-60 tracking-widest">
                            Verify your items below
                          </p>
                        </div>
                        <div className="flex items-center gap-2">
                          {cart.length > 0 && (
                            <button
                              onClick={clearCart}
                              className="bg-red-500/20 hover:bg-red-500 hover:text-white p-2 rounded-full transition-colors mr-1"
                              title="Clear Order"
                            >
                              <Trash2
                                size={20}
                                className="text-black hover:text-white"
                              />
                            </button>
                          )}
                          <button
                            onClick={() => setIsCartOpen(false)}
                            className="bg-black/10 hover:bg-black/20 p-2 rounded-full transition-colors"
                          >
                            <X size={20} className="text-black" />
                          </button>
                        </div>
                      </div>

                      {/* 🟩 ปรับแก้ UI ตรงนี้จากเดิมบอกให้แคปจอ เป็นปุ่มส่งออเดอร์เข้า LINE ทันที */}
                      <button
                        onClick={handleLineCheckout}
                        disabled={cart.length === 0}
                        className={`w-full py-3 px-4 rounded-lg flex items-center justify-center gap-3 font-black uppercase tracking-widest text-xs transition-all border shadow-md
                          ${cart.length > 0 
                            ? "bg-[#1d1e1e] hover:bg-black text-[#a0d4b2] border-black/20 active:scale-95 cursor-pointer" 
                            : "bg-black/10 text-black/40 border-transparent cursor-not-allowed"}`}
                      >
                        <LineIcon size={18} />
                        SEND ORDER TO LINE OA
                      </button>

                    </div>

                    <div className="p-4 space-y-4 bg-[#1d1e1e]">
                      {cart.length === 0 ? (
                        <div className="text-center py-10 text-gray-500 font-bold uppercase tracking-wide">
                          Your cart is empty
                        </div>
                      ) : (
                        Object.values(groupedCart).map((group, idx) => (
                          <div
                            key={group.name}
                            className="bg-white/5 border border-white/10 p-3 cart-item-enter relative group flex flex-col gap-2"
                          >
                            <div className="flex justify-between items-center border-b border-white/10 pb-2">
                              <span className="font-black text-[#a0d4b2] text-lg uppercase tracking-tight">
                                {group.name}
                              </span>
                              <div className="scale-75 origin-right">
                                <StatusBadge tags={group.tags} size="sm" />
                              </div>
                            </div>
                            <div className="flex flex-col gap-2">
                              {group.items.map((item) => (
                                <div
                                  key={item.id}
                                  className="flex justify-between items-start pl-2 border-l-2 border-[#a0d4b2]/30"
                                >
                                  <div className="flex flex-col">
                                    <div className="flex items-center gap-2">
                                      <span className="font-bold text-black bg-white text-[10px] px-1.5 rounded">
                                        {item.size}
                                      </span>
                                      <span className="text-xs text-gray-400">
                                        × 1
                                      </span>
                                    </div>
                                    {item.promo && (
                                      <div
                                        className="inline-block px-1.5 py-0.5 rounded-[2px] text-[8px] font-black uppercase mt-1 tracking-wide text-white w-fit"
                                        style={{
                                          backgroundColor: item.promo.includes(
                                            "BUY 1",
                                          )
                                            ? "#E61633"
                                            : "#FF2E7E",
                                        }}
                                      >
                                        {item.promo}
                                      </div>
                                    )}
                                  </div>
                                  <button
                                    onClick={() => removeFromCart(item.id)}
                                    className="text-gray-300 hover:text-red-500 p-2 transition-colors"
                                  >
                                    <Trash2 size={16} />
                                  </button>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))
                      )}
                    </div>

                    <div className="p-4 border-t border-gray-700 bg-black/20 shrink-0">
                      <div className="flex flex-col gap-2">
                        {totalGrams > 0 && (
                          <div className="flex justify-between items-end border-b border-gray-700/50 pb-2">
                            <span className="font-bold text-[#a0d4b2] text-sm uppercase">
                              Total Flower
                            </span>
                            <span className="font-black text-[#a0d4b2] text-3xl">
                              {totalGrams}{" "}
                              <span className="text-sm align-top text-[#a0d4b2]/70">
                                G
                              </span>
                            </span>
                          </div>
                        )}
                        {totalJoints > 0 && (
                          <div className="flex justify-between items-end">
                            <span className="font-bold text-[#a0d4b2] text-sm uppercase">
                              Total Pre-rolls
                            </span>
                            <span className="font-black text-[#a0d4b2] text-3xl">
                              {totalJoints}{" "}
                              <span className="text-sm align-top text-[#a0d4b2]/70">
                                JOINTS
                              </span>
                            </span>
                          </div>
                        )}
                        {totalGrams === 0 && totalJoints === 0 && (
                          <div className="text-center text-gray-500 text-xs italic py-2">
                            No items selected
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {ENABLE_CART && (
              <button
                onClick={() => setIsCartOpen(true)}
                className={`fixed bottom-6 right-6 z-[70] bg-[#1d1e1e] border border-[#a0d4b2]/40 shadow-2xl p-3 rounded-full text-white hover:text-[#a0d4b2] transition-all ${cartBump ? "scale-125 text-[#a0d4b2]" : ""}`}
                aria-label="Open cart"
              >
                <ShoppingBag size={22} />
                {cart.length > 0 && (
                  <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1d1e1e]">
                    {cart.length}
                  </span>
                )}
              </button>
            )}
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
